name: EvalForge CI/CD Gatekeeper

on:
  pull_request:
    branches:
      - main

jobs:
  evalforge-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest

      - name: Run Unit Tests
        run: |
          pytest tests/

      - name: Run EvalForge Model Diagnostic Gatekeeper
        # Replace the paths below with your actual dynamically trained model path in CI
        run: |
          # This demo just tests that the system works.
          # In reality, this would evaluate the dynamically trained PR model.
          python demo.py
          evalforge analyze \
            --model demo_model.pkl \
            --data demo_test.csv \
            --target target \
            --train-data demo_train.csv \
            --fail-under 80.0
